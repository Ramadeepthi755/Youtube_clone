<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Clone</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/header.css">
  <link rel="stylesheet" href="CSS/sidebar.css">
</head>

<body>

  <!-- ================= HEADER ================= -->

  <div class="header">

    <!-- Left -->
    <div class="left-section">
      <img class="menu" src="Images/headericons/3lines.jpg">
      <img class="icon" src="Images/headericons/YouTubelogo.jpg">
    </div>

    <!-- Middle -->
    <div class="middle-section">

      <input class="search-bar" type="text" placeholder="Search">

      <button class="search-button">
        <img class="search"
          src="Images/headericons/magnifying-glass-icon-isolated-on-white-background-search-illustration-vector.jpg">
        <div class="tooltip">Search</div>
      </button>

      <button class="voice-button">
        <img class="voice" src="Images/headericons/microphone-mic-icon-free-vector.jpg">
        <div class="tooltip">Search with voice</div>
      </button>

    </div>

    <!-- Right -->
    <div class="right-section">

      <div class="upload">
        <img class="video" src="Images/headericons/videoicon.jpg">
        <div class="tooltip">Create</div>
      </div>

      <img class="choose" src="Images/headericons/deviceconnector.png">

      <div class="notifications">
        <img class="bell" src="Images/headericons/bell-icon-free-vector.jpg">
        <div class="notification-count">3</div>
      </div>

      <img class="logo" src="Images/headericons/YouTubprofile.jpg">

    </div>

  </div>

  <!-- ================= SIDEBAR ================= -->

  <div class="sidebar">

    <div class="sidebar-link active" data-page="home">
      <img class="home" src="Images/Sidebaricons/home.jpg">
      <div>Home</div>
    </div>

    <div class="sidebar-link" data-page="explore">
      <img class="explore" src="Images/Sidebaricons/explore.jpg">
      <div>Explore</div>
    </div>

    <div class="sidebar-link" data-page="subscriptions">
      <img class="subscription" src="Images/Sidebaricons/subscription.jpg">
      <div>Subscriptions</div>
    </div>

    <div class="sidebar-link" data-page="shorts">
      <img class="original" src="Images/Sidebaricons/orginals.jpg">
      <div>Shorts</div>
    </div>

    <div class="sidebar-link" data-page="music">
      <img class="music" src="Images/Sidebaricons/YouTubemusic.jpg">
      <div>Music</div>
    </div>

    <div class="sidebar-link" data-page="library">
      <img class="library" src="Images/Sidebaricons/library.jpg">
      <div>Library</div>
    </div>

  </div>

  <!-- ================= CATEGORY BAR ================= -->

  <div class="categories">

    <section class="category-section">

      <button class="category active">All</button>
      <button class="category">Trending</button>
      <button class="category">Music</button>
      <button class="category">Gaming</button>
      <button class="category">News</button>
      <button class="category">Live</button>
      <button class="category">HTML</button>
      <button class="category">CSS</button>
      <button class="category">Javascript</button>
      <button class="category">React</button>
      <button class="category">Java</button>
      <button class="category">Python</button>
      <button class="category">Coding</button>
      <button class="category">Projects</button>
      <button class="category">Interview</button>
      <button class="category">Coding</button>
      <button class="category">Comunication</button>
      <button class="category">Motivation</button>
      <button class="category">Editing</button>

    </section>

  </div>

  <!-- ================= MAIN CONTENT ================= -->

  <div class="video-grid" id="video-grid">

    <div class="status-banner">
      Loading videos...
    </div>

  </div>

  <!-- ================= SHORTS SECTION ================= -->

  <div class="shorts-section" id="shorts-section">

    <h2 class="shorts-title">Shorts</h2>

    <div class="shorts-row" id="shorts-row">

      <!-- JS lo generate chestham -->

    </div>

  </div>

  <!-- ================= FOOTER ================= -->

  <div class="footer">
    <p>Built by Ramadeepthi • YouTube Clone</p>
  </div>
  
<div class="main-content">

  <!-- video grid -->
  <!-- shorts -->
  
</div>
  <!-- ================= JS ================= -->

  <script src="app.js" defer></script>

</body>

</html>
